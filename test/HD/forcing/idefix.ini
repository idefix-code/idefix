[Grid]
X1-grid    1  -0.5  32  u  0.5
X2-grid    1  -0.5  32  u  0.5
X3-grid    1  -0.5  32  u  0.5

[TimeIntegrator]
CFL         0.9
tstop       1.0
first_dt    1.e-4
nstages     2

[Hydro]
solver    hllc
csiso     constant  1.0

[Forcing]
iso3D   1.0 20.0   # kmin, kmax, 
mach    3           # presumably mach number?
t_corr   1.0          # used when Mach not set
epsilon  0.1          # idem

[Setup]
Nothing   nothing

[Boundary]
X1-beg    periodic
X1-end    periodic
X2-beg    periodic
X2-end    periodic
X3-beg    periodic
X3-end    periodic

[Output]
vtk     1.0
dmp     1.0
